<!-- wp:html -->
<template data-wp-each="state.comments" data-wp-key="context.item.id">
  <article class="heyfam-comment"
           data-wp-class--heyfam-comment--deep="context.item.is_deep"
           data-wp-bind--data-depth="context.item.depth"
           data-wp-bind--data-id="context.item.id"
           data-target-type="comment">
    <div class="heyfam-comment__avatar"
         data-wp-bind--style="`background:${context.item.avatar_color}`">
      <img class="heyfam-comment__avatar-img"
           data-wp-bind--src="context.item.author.avatar_url"
           data-wp-class--is-hidden="!context.item.author.avatar_url"
           onerror="this.style.display='none'" alt="" />
      <span class="heyfam-comment__avatar-initial"
            data-wp-text="context.item.avatar_initial"></span>
    </div>
    <div class="heyfam-comment__main">
      <header class="heyfam-comment__header">
        <strong data-wp-text="context.item.author.name"></strong>
        <span class="heyfam-comment__sep">·</span>
        <time class="heyfam-comment__time"
              data-wp-bind--datetime="context.item.created_at"
              data-wp-text="context.item.relative_time"></time>
      </header>
      <p class="heyfam-comment__attribution"
         data-wp-class--is-hidden="!context.item.parent_name">
        ↳ @<span data-wp-text="context.item.parent_name"></span>
      </p>
      <div class="heyfam-comment__body" data-wp-text="context.item.body"></div>
      <footer class="heyfam-comment__footer"
              data-wp-interactive="heyfam/reactions">
        <ul class="heyfam-reactions">
          <template data-wp-each--entry="context.item.reactionEntries">
            <li>
              <button data-wp-on--click="actions.toggle">
                <span data-wp-text="context.entry.0"></span>
                <span data-wp-text="context.entry.1"></span>
              </button>
            </li>
          </template>
          <li><button class="heyfam-comment__react" data-wp-on--click="actions.openPicker">+</button></li>
        </ul>
        <button class="heyfam-comment__reply"
                data-wp-interactive="heyfam/comments"
                data-wp-on--click="actions.reply">Reply</button>
      </footer>

      <form class="heyfam-comment-form heyfam-comment-form--inline"
            data-wp-interactive="heyfam/comments"
            data-wp-class--is-open="state.composing === context.item.id"
            data-wp-on--submit="actions.submit">
        <textarea data-wp-on--input="actions.updateBody"
                  data-wp-bind--value="state.body"
                  placeholder="Reply…" rows="2"></textarea>
        <div class="heyfam-comment-form__actions">
          <button type="button" data-wp-on--click="actions.cancelReply">Cancel</button>
          <button type="submit" data-wp-bind--disabled="state.submitting">Send</button>
        </div>
      </form>
    </div>
  </article>
</template>
<!-- /wp:html -->
