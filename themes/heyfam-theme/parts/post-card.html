<!-- wp:html -->
<template data-wp-each="state.posts" data-wp-each-key="context.item.id">
  <article class="heyfam-post-card"
           data-wp-class--heyfam-post-card--poll="context.item.poll"
           data-wp-bind--data-id="context.item.id"
           data-wp-bind--data-post-id="context.item.id"
           data-target-type="post">

    <header class="heyfam-post-card__header">
      <img class="heyfam-avatar"
           data-wp-bind--src="context.item.author.avatar_url"
           data-wp-bind--alt="context.item.author.name" />
      <strong data-wp-text="context.item.author.name"></strong>
      <time class="heyfam-post-card__time"
            data-wp-bind--datetime="context.item.created_at"
            data-wp-text="context.item.relative_time"></time>
      <span class="heyfam-poll__badge"
            data-wp-class--is-hidden="!context.item.poll || !context.item.poll.closed">closed</span>

      <div class="heyfam-post-card__actions">
        <div class="heyfam-menu">
          <button type="button" class="heyfam-button heyfam-button--icon heyfam-button--sm heyfam-button--tertiary heyfam-menu__trigger"
                  aria-label="More" data-tooltip="More"
                  data-wp-on--click="actions.togglePostMenu">
            <svg class="hf-icon" width="14" height="14" aria-hidden="true"><use href="#hfi-more-vertical"></use></svg>
          </button>
          <ul class="heyfam-menu__list"
              data-wp-class--is-open="context.item.menuOpen"
              role="menu">
            <li>
              <a class="heyfam-menu__item" role="menuitem"
                 data-wp-bind--href="context.item.permalink">
                <svg class="hf-icon" width="14" height="14" aria-hidden="true"><use href="#hfi-external-link"></use></svg>
                Visit
              </a>
            </li>
            <li>
              <button type="button" class="heyfam-menu__item" role="menuitem"
                      data-wp-on--click="actions.copyPostLink">
                <svg class="hf-icon" width="14" height="14" aria-hidden="true"><use href="#hfi-copy"></use></svg>
                Copy URL
              </button>
            </li>
            <li data-wp-class--is-hidden="!context.item.is_mine">
              <button type="button" class="heyfam-menu__item" role="menuitem"
                      data-wp-on--click="actions.editPost">
                <svg class="hf-icon" width="14" height="14" aria-hidden="true"><use href="#hfi-edit"></use></svg>
                Edit
              </button>
            </li>
            <li data-wp-class--is-hidden="!context.item.is_mine">
              <button type="button" class="heyfam-menu__item heyfam-menu__item--danger" role="menuitem"
                      data-wp-on--click="actions.deletePost">
                <svg class="hf-icon" width="14" height="14" aria-hidden="true"><use href="#hfi-trash"></use></svg>
                Delete
              </button>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <div class="heyfam-post-card__body"
         data-wp-class--is-hidden="context.item.poll"
         data-wp-text="context.item.body"></div>

    <!-- Poll widget — rendered only when context.item.poll is set. The vote
         click handler crosses into heyfam/polls; we keep the surrounding
         directives in the parent feed namespace so `context.item` (set up by
         the outer data-wp-each iteration) stays in scope. -->
    <div class="heyfam-poll"
         data-wp-class--is-hidden="!context.item.poll">
      <h3 class="heyfam-poll__question" data-wp-text="context.item.body"></h3>
      <ul class="heyfam-poll__options">
        <template data-wp-each--option="context.item.poll.options"
                  data-wp-each-key="context.option.index">
          <li class="heyfam-poll__option"
              data-wp-class--is-mine="context.option.is_my_vote">
            <button type="button" class="heyfam-poll__button"
                    data-wp-bind--data-option-index="context.option.index"
                    data-wp-bind--disabled="context.item.poll.closed"
                    data-wp-on--click="heyfam/polls::actions.vote">
              <span class="heyfam-poll__bar"
                    data-wp-bind--style="context.option.bar_style"></span>
              <span class="heyfam-poll__emoji"
                    data-wp-class--is-hidden="!context.option.emoji"
                    data-wp-text="context.option.emoji"></span>
              <span class="heyfam-poll__label" data-wp-text="context.option.label"></span>
              <ul class="heyfam-poll__voters">
                <template data-wp-each--voter="context.option.voters"
                          data-wp-each-key="context.voter.user_id">
                  <li>
                    <img class="heyfam-poll__voter"
                         data-wp-bind--src="context.voter.avatar_url"
                         data-wp-bind--alt="context.voter.name"
                         data-wp-bind--data-tooltip="context.voter.name" />
                  </li>
                </template>
              </ul>
            </button>
          </li>
        </template>
      </ul>
      <p class="heyfam-poll__meta">
        <span data-wp-text="context.item.poll.total_votes"></span> vote(s)
      </p>
    </div>

    <img class="heyfam-post-card__photo"
         data-wp-bind--src="context.item.photo_url"
         data-wp-class--is-hidden="!context.item.photo_url" alt="" />

    <footer class="heyfam-post-card__reactions">
      <ul class="heyfam-reactions">
        <template data-wp-each--entry="context.item.reactionEntries">
          <li>
            <button class="heyfam-reactions__chip"
                    data-wp-class--is-mine="context.entry.mine"
                    data-wp-bind--data-tooltip="context.entry.users_text"
                    data-wp-on--click="heyfam/reactions::actions.toggle">
              <span data-wp-text="context.entry.emoji"></span>
              <span class="heyfam-reactions__chip-count" data-wp-text="context.entry.count"></span>
            </button>
          </li>
        </template>
        <li>
          <button class="heyfam-reactions__chip heyfam-reactions__chip--add"
                  aria-label="Add reaction"
                  data-tooltip="Add reaction"
                  data-wp-on--click="heyfam/reactions::actions.openPicker">
            <svg class="hf-icon" width="18" height="18" aria-hidden="true"><use href="#hfi-emoji-add"></use></svg>
          </button>
        </li>
      </ul>
    </footer>

    <section class="heyfam-comments">
      <template data-wp-each--comment="heyfam/feed::context.item.comments"
                data-wp-each-key="context.comment.id">
        <article class="heyfam-comment"
                 data-wp-class--heyfam-comment--deep="context.comment.is_deep"
                 data-wp-bind--data-depth="context.comment.depth"
                 data-wp-bind--data-id="context.comment.id"
                 data-target-type="comment">
          <img class="heyfam-avatar"
               data-wp-bind--src="context.comment.author.avatar_url"
               data-wp-bind--alt="context.comment.author.name" />
          <div class="heyfam-comment__main">
            <header class="heyfam-comment__header">
              <strong data-wp-text="context.comment.author.name"></strong>
              <time class="heyfam-comment__time"
                    data-wp-bind--datetime="context.comment.created_at"
                    data-wp-text="context.comment.relative_time"></time>
            </header>
            <p class="heyfam-comment__attribution"
               data-wp-class--is-hidden="!context.comment.parent_name">
              ↳ @<span data-wp-text="context.comment.parent_name"></span>
            </p>
            <div class="heyfam-comment__body" data-wp-text="context.comment.body"></div>
            <footer class="heyfam-comment__footer">
              <ul class="heyfam-reactions">
                <template data-wp-each--entry="context.comment.reactionEntries">
                  <li>
                    <button class="heyfam-reactions__chip"
                            data-wp-class--is-mine="context.entry.mine"
                            data-wp-bind--data-tooltip="context.entry.users_text"
                            data-wp-on--click="heyfam/reactions::actions.toggle">
                      <span data-wp-text="context.entry.emoji"></span>
                      <span class="heyfam-reactions__chip-count" data-wp-text="context.entry.count"></span>
                    </button>
                  </li>
                </template>
                <li>
                  <button class="heyfam-reactions__chip heyfam-reactions__chip--add"
                          aria-label="Add reaction"
                          data-tooltip="Add reaction"
                          data-wp-on--click="heyfam/reactions::actions.openPicker">
                    <svg class="hf-icon" width="18" height="18" aria-hidden="true"><use href="#hfi-emoji-add"></use></svg>
                  </button>
                </li>
              </ul>
              <button class="heyfam-reactions__chip heyfam-reactions__chip--add heyfam-comment__reply"
                      aria-label="Reply" data-tooltip="Reply"
                      data-wp-on--click="heyfam/comments::actions.reply">
                <svg class="hf-icon" width="14" height="14" aria-hidden="true"><use href="#hfi-reply"></use></svg>
              </button>
            </footer>

            <form class="heyfam-comment-form heyfam-comment-form--inline"
                  data-wp-interactive="heyfam/comments"
                  data-wp-on--submit="actions.submit">
              <img class="heyfam-avatar heyfam-comment-form__avatar"
                   data-wp-bind--src="heyfam::state.userAvatarUrl"
                   alt="" />
              <div class="heyfam-comment-form__field">
                <textarea class="heyfam-textarea" placeholder="Reply…" rows="1"
                          data-wp-on--input="actions.updateBody"
                          data-wp-bind--value="state.body"></textarea>
                <button type="submit"
                        class="heyfam-button heyfam-button--icon heyfam-button--primary heyfam-comment-form__send"
                        aria-label="Send" data-tooltip="Send"
                        data-wp-bind--disabled="state.submitting">
                  <svg class="hf-icon" width="16" height="16" aria-hidden="true"><use href="#hfi-message-check"></use></svg>
                </button>
              </div>
            </form>
          </div>
        </article>
      </template>

      <form class="heyfam-comment-form heyfam-comment-form--root"
            data-wp-interactive="heyfam/comments"
            data-wp-on--submit="actions.submit">
        <img class="heyfam-avatar heyfam-comment-form__avatar"
             data-wp-bind--src="heyfam::state.userAvatarUrl"
             alt="" />
        <div class="heyfam-comment-form__field">
          <textarea class="heyfam-textarea" placeholder="Add a comment…" rows="1"
                    data-wp-on--input="actions.autosize"></textarea>
          <button type="submit"
                  class="heyfam-button heyfam-button--icon heyfam-button--primary heyfam-comment-form__send"
                  aria-label="Send" data-tooltip="Send"
                  data-wp-bind--disabled="state.submitting">
            <svg class="hf-icon" width="16" height="16" aria-hidden="true"><use href="#hfi-message-check"></use></svg>
          </button>
        </div>
      </form>
    </section>
  </article>
</template>
<!-- /wp:html -->
