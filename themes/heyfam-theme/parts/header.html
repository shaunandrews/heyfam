<!-- wp:html -->
<div class="heyfam-lightbox"
     data-wp-interactive="heyfam/lightbox"
     data-wp-init="callbacks.init"
     data-wp-class--is-open="state.open"
     data-wp-on--click="actions.onBackdrop"
     role="dialog" aria-modal="true" aria-label="Photo">
  <button class="heyfam-lightbox__close"
          type="button"
          data-wp-on--click="actions.close"
          aria-label="Close">×</button>
  <button class="heyfam-lightbox__nav heyfam-lightbox__nav--prev"
          type="button"
          data-wp-bind--disabled="!state.hasPrev"
          data-wp-on--click="actions.prev"
          aria-label="Previous">‹</button>
  <figure class="heyfam-lightbox__figure">
    <img class="heyfam-lightbox__img"
         data-wp-bind--src="state.currentUrl"
         data-wp-bind--alt="state.currentAlt" />
    <figcaption class="heyfam-lightbox__caption"
                data-wp-text="state.position"
                data-wp-class--is-hidden="!state.position"></figcaption>
  </figure>
  <button class="heyfam-lightbox__nav heyfam-lightbox__nav--next"
          type="button"
          data-wp-bind--disabled="!state.hasNext"
          data-wp-on--click="actions.next"
          aria-label="Next">›</button>
</div>
<!-- /wp:html -->
