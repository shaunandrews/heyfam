<!-- wp:template-part {"slug":"header","tagName":"header"} /-->

<!-- wp:group {"layout":{"type":"constrained"},"className":"heyfam-auth"} -->
<div class="wp-block-group heyfam-auth">
  <!-- wp:html -->
  <div data-wp-interactive="heyfam/invite" data-wp-init="callbacks.init">
    <h1 data-wp-class--is-hidden="state.previewLoaded">Accept invite</h1>
    <h1 data-wp-class--is-hidden="!state.previewLoaded">Join <span data-wp-text="state.famName"></span></h1>
    <p data-wp-class--is-hidden="!state.previewLoaded">
      <strong data-wp-text="state.inviter"></strong> invited you. We sent the invite to <span data-wp-text="state.phoneHint"></span>.
    </p>
    <p class="error" data-wp-class--is-hidden="!state.previewError" data-wp-text="state.previewError"></p>

    <form data-wp-class--is-hidden="state.phoneFormHidden" data-wp-on--submit="actions.submitPhone">
      <label>Your phone
        <input class="heyfam-input" type="tel" inputmode="tel" autocomplete="tel"
               data-wp-on--input="actions.updatePhone" data-wp-bind--value="state.phone"
               placeholder="+15555550100" required />
      </label>
      <p class="error" data-wp-class--is-hidden="!state.error" data-wp-text="state.error"></p>
      <button type="submit" class="heyfam-button heyfam-button--primary heyfam-button--block"
              data-wp-bind--disabled="state.busy">Send code</button>
    </form>

    <form data-wp-class--is-hidden="state.codeFormHidden" data-wp-on--submit="actions.submitCode">
      <p>We sent a 6-digit code to <strong data-wp-text="state.phone"></strong>.</p>
      <label>Code
        <input class="heyfam-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6"
               data-wp-on--input="actions.updateCode" data-wp-bind--value="state.code" required />
      </label>
      <label>Your name <span class="prefix">(new members only)</span>
        <input class="heyfam-input" type="text"
               data-wp-on--input="actions.updateName" data-wp-bind--value="state.name"
               maxlength="60" />
      </label>
      <p class="error" data-wp-class--is-hidden="!state.error" data-wp-text="state.error"></p>
      <button type="submit" class="heyfam-button heyfam-button--primary heyfam-button--block"
              data-wp-bind--disabled="state.busy">Join fam</button>
      <button type="button" class="heyfam-button heyfam-button--ghost"
              data-wp-on--click="actions.backToPhone">Use a different number</button>
    </form>

    <form data-wp-class--is-hidden="state.loggedInFormHidden" data-wp-on--submit="actions.joinAsCurrentUser">
      <p>You're already signed in. One tap to join <strong data-wp-text="state.famName"></strong>.</p>
      <p class="error" data-wp-class--is-hidden="!state.error" data-wp-text="state.error"></p>
      <button type="submit" class="heyfam-button heyfam-button--primary heyfam-button--block"
              data-wp-bind--disabled="state.busy">Join <span data-wp-text="state.famName"></span></button>
    </form>
  </div>
  <!-- /wp:html -->
</div>
<!-- /wp:group -->
