<!-- wp:template-part {"slug":"header","tagName":"header"} /-->

<!-- wp:group {"layout":{"type":"constrained"},"className":"heyfam-feed"} -->
<div class="wp-block-group heyfam-feed">
  <!-- wp:html -->
  <aside class="heyfam-nudge"
         data-wp-interactive="heyfam/nudge"
         data-wp-init="callbacks.init"
         data-wp-class--is-visible="state.visible">
    <div>
      <strong>Invite the rest of your fam.</strong>
      Add their numbers anytime from your <a href="/account">account page</a>.
    </div>
    <button type="button" data-wp-on--click="actions.dismiss" aria-label="Dismiss" data-tooltip="Dismiss">×</button>
  </aside>
  <!-- /wp:html -->

  <!-- wp:html -->
  <div class="heyfam-composer-inline"
       data-wp-interactive="heyfam/composer"
       data-wp-class--is-hidden="state.editorOpen">
    <!-- wp:template-part {"slug":"composer"} /-->
  </div>
  <!-- /wp:html -->

  <!-- wp:html -->
  <section class="heyfam-feed__list"
           data-wp-interactive="heyfam/feed"
           data-wp-init="callbacks.bootstrap">
    <!-- wp:template-part {"slug":"post-card"} /-->
    <p class="heyfam-feed__empty" data-wp-class--is-hidden="state.hasPosts">No posts yet — say hey to your fam.</p>
  </section>
  <!-- /wp:html -->

  <!-- wp:template-part {"slug":"post-editor"} /-->
  <!-- wp:template-part {"slug":"post-delete"} /-->
</div>
<!-- /wp:group -->
