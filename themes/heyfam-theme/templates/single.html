<!-- wp:template-part {"slug":"header","tagName":"header"} /-->

<!-- wp:group {"layout":{"type":"constrained"},"className":"heyfam-single"} -->
<div class="wp-block-group heyfam-single"
     data-wp-interactive="heyfam/single"
     data-wp-init="callbacks.bootstrap">
  <!-- wp:html -->
  <article class="heyfam-post-card" data-wp-bind--data-post-id="state.post.id">
    <header><strong data-wp-text="state.post.author.name"></strong></header>
    <div class="heyfam-post-card__body" data-wp-text="state.post.body"></div>
    <img class="heyfam-post-card__photo"
         data-wp-bind--src="state.post.photo_url"
         data-wp-bind--hidden="!state.post.photo_url" alt="" />
  </article>

  <section class="heyfam-comments">
    <template data-wp-each="state.comments">
      <div class="heyfam-comment" data-wp-key="context.item.id">
        <strong data-wp-text="context.item.author.name"></strong>
        <p data-wp-text="context.item.body"></p>
        <button data-wp-on--click="actions.reply"
                data-wp-context='{"parent_id":0}'>Reply</button>
        <template data-wp-each="context.item.children">
          <div class="heyfam-comment heyfam-comment--child" data-wp-key="context.item.id">
            <strong data-wp-text="context.item.author.name"></strong>
            <p data-wp-text="context.item.body"></p>
          </div>
        </template>
      </div>
    </template>

    <form class="heyfam-comment-form"
          data-wp-on--submit="actions.submit">
      <textarea data-wp-on--input="actions.updateBody"
                data-wp-bind--value="state.body" placeholder="Reply…" rows="2"></textarea>
      <button type="submit" data-wp-bind--disabled="state.submitting">Send</button>
    </form>
  </section>
  <!-- /wp:html -->
</div>
<!-- /wp:group -->
